name: Build Unsigned IPA (Local Compile Strategy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          # 安装移动端编译工具
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆指定版本的内核源码 (v1.11.3 为当前稳定版，可根据需要修改)
          git clone --branch v1.11.3 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 执行编译命令
          # -target ios: 编译 iOS 平台
          # -o ../Libbox.xcframework: 输出到根目录，并命名为 Xcode 期待的大写 Libbox
          # ./lib/mobile: 对应 sing-box 源码中的移动端绑定入口
          gomobile bind -v -target ios -iosversion 15.0 -o ../Libbox.xcframework ./lib/mobile
          
          # 3. 验证产物
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 自动定位项目文件
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          # 执行归档，关闭所有签名校验
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找生成的 .app 文件夹
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found! Archive tree:"
            ls -R build
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa
          retention-days: 1

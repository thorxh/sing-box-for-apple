name: Build Unsigned IPA (Go 1.25 Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # 升级到 1.25 以匹配最新的 x/mobile 依赖
          go-version: '1.25'
          cache: true

      - name: Install Gomobile Tools
        run: |
          # 现代 Go 规范：直接使用 install 安装二进制工具
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 初始化 gomobile
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆 v1.13.11 内核
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 在 module 内部下载依赖，这会自动处理 bind 包
          go mod download
          
          # 3. 编译 Libbox.xcframework
          # 使用全限定包名，这是目前最稳的方式
          $(go env GOPATH)/bin/gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/lib/mobile
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

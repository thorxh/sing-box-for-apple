name: Build Unsigned IPA (Final Path Discovery)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile Tools
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          
          GOPATH=$(go env GOPATH)
          echo "$GOPATH/bin" >> $GITHUB_PATH
          $GOPATH/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核 v1.13.11
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐依赖
          go mod download
          
          # 3. 运行官方脚本 (锁定 iOS 平台)
          export GO111MODULE=on
          # 增加 -debug 看看详细输出，如果还找不到产物，日志里会有线索
          go run ./cmd/internal/build_libbox -platform ios -target ios
          
          cd ..
          
          # 4. 强力搜寻产物
          echo "Searching for generated xcframework..."
          # 递归寻找所有 .xcframework 目录
          FOUND_PATH=$(find core -name "*.xcframework" -type d | head -n 1)
          
          if [ -n "$FOUND_PATH" ]; then
            echo "Found framework at: $FOUND_PATH"
            # 统一重命名为 Xcode 项目引用的 Libbox.xcframework
            rm -rf ./Libbox.xcframework
            cp -r "$FOUND_PATH" ./Libbox.xcframework
            echo "Successfully moved to ./Libbox.xcframework"
          else
            echo "CRITICAL ERROR: No .xcframework was found anywhere in core/ directory."
            echo "Listing core directory structure for debugging:"
            ls -R core
            exit 1
          fi

      - name: Xcode Build (No Sign)
        run: |
          # 确保 Libbox 在位
          ls -d Libbox.xcframework
          
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

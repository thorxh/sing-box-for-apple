name: Build Unsigned IPA (New Core Structure Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          # 必须使用 SagerNet 的 fork，否则 experimental/libbox 的某些 ObjC 类型转换会报错
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework (Targeting Experimental)
        run: |
          # 1. 克隆内核 (v1.11.3 匹配你的目录树)
          git clone --branch v1.11.3 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 整理依赖
          go mod download
          
          # 3. 核心修正：编译入口改为 experimental/libbox
          # 这是新版内核唯一正确的导出入口
          # 增加 -tags 确保所有功能（如 QUIC/Shadowsocks）的接口都被导出
          export GO111MODULE=on
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -tags "with_quic with_dhcp with_wireguard with_shadowsocks with_ech" \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/experimental/libbox
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保 Libbox 已经到位
          [ -d "Libbox.xcframework" ] || { echo "Libbox missing!"; exit 1; }
          
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned
          path: sing-box-unsigned.ipa

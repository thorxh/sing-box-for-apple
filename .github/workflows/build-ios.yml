name: Build Unsigned IPA (Gomobile Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Fix Gomobile Environment
        run: |
          # 1. 安装最新版 gomobile 和 gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 2. 核心补丁：手动下载 mobile 仓库依赖，解决 "no Go package" 报错
          go get golang.org/x/mobile/bind
          
          # 3. 初始化
          /Users/runner/go/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 克隆内核
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 整理依赖，确保 gomobile 能识别项目结构
          go mod download
          
          # 编译命令：使用绝对路径确保 gobind 能找到包
          # 如果 ./lib/mobile 报错，直接用完整的包名
          /Users/runner/go/bin/gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/lib/mobile
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

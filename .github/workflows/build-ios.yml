name: Build Unsigned IPA (Manual Precision Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile Tools
        run: |
          # 精准安装 SagerNet 修补版工具链
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework (Manual Precision)
        run: |
          # 1. 克隆内核
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 必须在内核目录下执行，以确保 go.mod 生效
          go mod download
          
          # 3. 手动执行 gomobile bind
          # 关键点 1：入口必须是 ./experimental/libbox
          # 关键点 2：必须带上 ios 相关的 tags，否则 experimental 里的代码会被排除（导致 no exported names）
          # 关键点 3：必须显式指定目标为 ios
          export GO111MODULE=on
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -tags "with_quic with_dhcp with_wireguard with_shadowsocks with_ech with_utls with_clash_api with_gvisor" \
            -o ../Libbox.xcframework \
            ./experimental/libbox
          
          cd ..
          # 验证
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保 Libbox 就在当前目录下
          [ -d "Libbox.xcframework" ] || { echo "Libbox missing!"; exit 1; }
          
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

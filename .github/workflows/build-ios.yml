name: Build Unsigned IPA (GOPATH Injection Strategy)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile Tools
        run: |
          # 必须使用 sagernet 的 fork 版本，否则 iOS 绑定会报错
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          
          # 将工具加入环境变量
          GOPATH=$(go env GOPATH)
          echo "$GOPATH/bin" >> $GITHUB_PATH
          
          # 初始化
          $GOPATH/bin/gomobile init

      - name: Build Libbox Framework (Manual Bind)
        run: |
          # 1. 克隆内核源码到指定目录
          git clone --branch v1.11.3 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐依赖，这是解决 "no Go package" 的核心
          go mod download
          
          # 3. 手动绑定输出。注意：-o 路径必须指向 ../Libbox.xcframework
          # 目标包路径为 github.com/SagerNet/sing-box/lib/mobile
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            ./lib/mobile
          
          cd ..
          # 验证 Libbox 是否生成成功
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 强制解析依赖并进行归档
          # SFI 是 iOS 项目的默认 Scheme
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 在归档中搜索生成的 .app 文件夹
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found! Current build structure:"
            ls -R build
            exit 1
          fi
          
          echo "Packaging $APP_PATH..."
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.11.3-unsigned
          path: sing-box-unsigned.ipa
          retention-days: 3

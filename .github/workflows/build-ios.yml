name: Build Unsigned IPA (Download Core Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Download Prebuilt Libbox
        run: |
          # 1. 从官方获取最新的预编译内核
          # 这里我们直接从 SagerNet 的 releases 或指定的源下载
          # 如果你的仓库有特定的版本需求，可以调整 URL
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Fetching sing-box core $VERSION"
          
          # 下载 iOS 平台的 xcframework
          # 注意：文件名必须精准匹配 Xcode 报错要求的 "Libbox.xcframework"
          curl -Lo libbox.zip "https://github.com/SagerNet/sing-box/releases/download/$VERSION/libbox-xcframework.zip"
          unzip libbox.zip
          
          # 2. 核心步骤：重命名并移动到根目录
          # 报错说要在根目录找 Libbox.xcframework，我们就给它一个
          mv libbox.xcframework Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 强制解析远程依赖并构建
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找生成的 .app
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

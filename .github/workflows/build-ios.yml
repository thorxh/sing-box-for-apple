name: Build Unsigned IPA (Auto-Discovery)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Locate and Build Go Core
        run: |
          # 全盘寻找 go.mod
          MOD_PATH=$(find . -name "go.mod" -print -quit)
          if [ -n "$MOD_PATH" ]; then
            MOD_DIR=$(dirname "$MOD_PATH")
            echo "Found Go module in $MOD_DIR, building..."
            cd "$MOD_DIR"
            go mod tidy
            
            # 寻找编译脚本
            SCRIPT=$(find . -name "gen_framework" | head -n 1)
            if [ -n "$SCRIPT" ]; then
              go run "$SCRIPT" --platform ios
            fi
          else
            echo "No go.mod found. This project might use SPM for remote dependencies."
          fi

      - name: Xcode Build (No Sign)
        run: |
          # 1. 自动解析项目文件
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 2 | head -n 1)
          
          # 2. 尝试解析可用 Scheme (优先找 SFI 或 sing-box)
          SCHEME=$(xcodebuild -list -project "$PROJ" | grep -E "SFI|sing-box" | head -n 1 | tr -d ' ')
          echo "Using Scheme: $SCHEME"
          
          # 3. 强制解析远程依赖并归档
          xcodebuild -project "$PROJ" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 在归档目录中深度搜索 .app
          APP_PATH=$(find build/sing-box.xcarchive -name "*.app" -type d | grep -v "Services" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed: .app not found."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 确保子模块拉取
          fetch-depth: 0

      - name: List Directory Structure (Debug)
        run: |
          echo "--- Root Directory Content ---"
          ls -R
          echo "--- End of Structure ---"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build SFA Framework
        run: |
          # 针对 SagerNet 仓库的特殊路径处理
          # 尝试进入可能包含 go.mod 的目录
          if [ -d "sing-box" ]; then
            cd sing-box
          fi
          
          # 检查当前目录
          ls -F
          
          # 如果还是没有 go.mod，尝试手动初始化（兜底方案）
          if [ ! -f "go.mod" ]; then
             go mod init github.com/SagerNet/sing-box-for-apple || true
          fi
          
          go mod tidy
          
          # 执行编译脚本 - 此时根据 Debug 结果调整路径
          # 我们尝试在全项目搜索 gen_framework 并执行
          SCRIPT_PATH=$(find . -name "gen_framework" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: gen_framework not found!"
            exit 1
          fi
          go run "$SCRIPT_PATH" --platform ios

      - name: Xcode Build (No Sign)
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/SFA.xcarchive/Products/Applications -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

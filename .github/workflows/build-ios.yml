name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch: # 手动触发构建

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Compile Frameworks
        run: |
          # 编译 sing-box 核心
          make libs

      - name: Xcode Build (No Sign)
        run: |
          # 使用 xcodebuild 进行构建，但强制关闭签名校验
          xcodebuild -workspace SFA.xcworkspace \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE=""

      - name: Package Unsigned IPA
        run: |
          # 手动将 .app 包装成 IPA 格式
          mkdir -p Payload
          cp -r build/SFA.xcarchive/Products/Applications/SFA.app Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

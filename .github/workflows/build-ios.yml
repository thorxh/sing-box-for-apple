name: Build Unsigned IPA (Nuclear Option)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework (Proven Method)
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          export GO111MODULE=on
          gomobile bind -target ios -iosversion 15.0 -tags "$GO_TAGS" -ldflags "$GO_LDFLAGS" -o ../Libbox.xcframework ./experimental/libbox
          cd ..

      - name: Physical Alignment (Vim Style)
        run: |
          # 这一步极其关键：将库放入多个关键路径，确保子项目能强制识别
          mkdir -p Frameworks
          mkdir -p Library/Frameworks
          
          # 物理拷贝到所有可能的搜索盲区
          cp -R Libbox.xcframework ./Frameworks/
          cp -R Libbox.xcframework ./Library/Frameworks/
          # 甚至直接放入编译器的默认库路径 (SDK 模拟)
          cp -R Libbox.xcframework ./Library/
          
          echo "Libbox deployed to all critical paths."

      - name: Xcode Build (Force Overide)
        run: |
          PROJ="sing-box.xcodeproj"
          SCHEME="SFI"
          
          # 强制解析依赖
          xcodebuild -resolvePackageDependencies -project "$PROJ" -scheme "$SCHEME"

          # 终极编译命令：
          # 1. 禁用所有签名相关的检查
          # 2. 强制使用本地 Frameworks 路径
          # 3. 忽略无效的 Entitlements
          xcodebuild build -project "$PROJ" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     FRAMEWORK_SEARCH_PATHS="$(pwd) $(pwd)/Frameworks $(pwd)/Library $(pwd)/Library/Frameworks" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
                     SWIFT_COMPILATION_MODE=wholemodule

      - name: Package Unsigned IPA
        run: |
          echo "Locating SFI.app..."
          # 深度搜索 Release-iphoneos 目录下的产物
          APP_PATH=$(find build_output -name "SFI.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            # 备选查找
            APP_PATH=$(find build_output -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app file not found. Listing all generated files for debug:"
            find build_output -maxdepth 5 -name "*.app" || echo "No apps found"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -rf "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

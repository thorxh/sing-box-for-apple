name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 深度递归子模块
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Fix Go Workspace
        run: |
          # 强制同步依赖，防止脚本找不到 main module
          go mod tidy
          # 确保所有的子模块和依赖都在位
          git submodule update --init --recursive

      - name: Build SFA Framework
        run: |
          # 使用项目内置脚本生成 .xcframework
          # 如果根目录没有 go.mod，脚本通常在 ./cmd 下运行，这里我们直接运行根目录脚本
          go run ./cmd/gen_framework --platform ios

      - name: Xcode Build (No Sign)
        run: |
          # 核心：关闭签名校验进行归档
          xcodebuild -workspace SFA.xcworkspace \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          # 创建 Payload 结构并打包
          mkdir -p Payload
          # 自动寻找生成的 .app 文件夹
          find build/SFA.xcarchive/Products/Applications -name "*.app" -exec cp -r {} Payload/ \;
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa
          retention-days: 7 # 节省 GitHub 空间

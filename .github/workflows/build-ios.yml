name: Build Unsigned IPA (Library Focus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build SFA Framework
        # 核心变动：根据你之前的目录树，进入 Library 目录执行
        working-directory: Library
        run: |
          # 如果这里没有 go.mod，我们就去它下面的目录找，或者直接执行编译脚本
          # 针对新版 sing-box-for-apple，代码通常就在这
          go mod tidy || echo "No mod file here, attempting to run script anyway"
          
          # 查找 gen_framework 脚本（可能在 ./cmd/gen_framework）
          SCRIPT=$(find . -name "gen_framework" | head -n 1)
          if [ -z "$SCRIPT" ]; then
             echo "Error: gen_framework not found in Library!"
             ls -R
             exit 1
          fi
          go run "$SCRIPT" --platform ios

      - name: Xcode Build (No Sign)
        run: |
          # 在根目录进行 Xcode 构建
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

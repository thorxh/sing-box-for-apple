name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build SFA Framework
        run: |
          # 核心步骤：将 Go 代码编译为 iOS 框架
          # 注意：具体路径可能随版本变化，通常在项目根目录执行
          go run ./cmd/gen_framework --platform ios

      - name: Xcode Build (No Sign)
        run: |
          # 强制关闭签名校验进行构建
          xcodebuild -workspace SFA.xcworkspace \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE=""

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 注意检查这个路径，不同版本可能在 SFA.app 或 sing-box.app
          cp -r build/SFA.xcarchive/Products/Applications/*.app Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

name: Build Unsigned IPA (GOPATH Injection Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install and Inject Mobile Source
        run: |
          # 1. 设置环境变量
          GOPATH=$(go env GOPATH)
          echo "$GOPATH/bin" >> $GITHUB_PATH
          
          # 2. 安装二进制工具
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 3. 核心注入：手动创建目录并将 mobile 源码克隆到 GOPATH
          # 这是解决 "no Go package in golang.org/x/mobile/bind" 的终极手段
          mkdir -p $GOPATH/src/golang.org/x
          git clone --depth 1 https://github.com/golang/mobile.git $GOPATH/src/golang.org/x/mobile
          
          # 4. 初始化
          $GOPATH/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 克隆内核
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 这一步确保内核自己的依赖也是齐的
          go mod download
          
          # 强制关闭 CGO 限制，确保 gomobile 能够交叉编译
          export CGO_ENABLED=1
          
          # 执行编译
          # 我们直接指定全路径包名，并让 gomobile 在这个 context 下运行
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/lib/mobile
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

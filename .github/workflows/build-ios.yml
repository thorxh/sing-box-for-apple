name: Build Unsigned IPA (Stable 1.13.11)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Gomobile Tools
        run: |
          # 1. 全局安装编译工具
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          
          # 2. 初始化环境
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆指定的 v1.13.11 版本
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 预下载所有 Go 依赖
          go mod download
          
          # 3. 核心修复：手动安装 bind 包到工作区，防止 gomobile 找不到
          go get golang.org/x/mobile/bind
          
          # 4. 执行编译
          # 使用全限定包名 github.com/SagerNet/sing-box/lib/mobile
          $(go env GOPATH)/bin/gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/lib/mobile
          
          cd ..
          # 确认产物
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 找到工程文件并编译
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找生成的 .app 并打包
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found! Current build dir:"
            ls -R build
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

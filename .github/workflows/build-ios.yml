name: Build and Sign iOS IPA

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
        run: |
          # 创建临时钥匙串
          security create-keychain -p "build_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build_pass" build.keychain
          
          # 导入 P12
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build_pass" build.keychain
          
          # 部署描述文件
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Patch Bundle ID & App Group
        run: |
          # 动态替换代码中的官方 ID，避免手动修改源码
          # 假设原 ID 是 com.sagernet.sing-box
          OLD_ID="com.sagernet.sing-box"
          OLD_GROUP="group.com.sagernet.sing-box"
          NEW_ID="${{ secrets.MY_BUNDLE_ID }}"
          NEW_GROUP="${{ secrets.MY_APP_GROUP }}"
          
          find . -type f -name "*.pbxproj" -exec sed -i '' "s/$OLD_ID/$NEW_ID/g" {} +
          find . -type f -name "*.pbxproj" -exec sed -i '' "s/$OLD_GROUP/$NEW_GROUP/g" {} +
          find . -type f -name "*.swift" -exec sed -i '' "s/$OLD_GROUP/$NEW_GROUP/g" {} +
          find . -type f -name "*.entitlements" -exec sed -i '' "s/$OLD_GROUP/$NEW_GROUP/g" {} +

      - name: Compile Frameworks
        run: |
          # 调用项目自带的编译脚本生成必要的 .xcframework
          make libs

      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  "${{ secrets.MY_BUNDLE_ID }}": "build"
                  "${{ secrets.MY_BUNDLE_ID }}.PacketTunnel": "build"
              </dict>
          </dict>
          </plist>
          EOF

      - name: Xcode Archive & Export
        run: |
          # 1. 构建 Archive
          xcodebuild -workspace SFA.xcworkspace \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGN_IDENTITY="Apple Development" \
                     PROVISIONING_PROFILE_SPECIFIER="build"
          
          # 2. 导出 IPA
          xcodebuild -exportArchive \
                     -archivePath build/SFA.xcarchive \
                     -exportPath build/out \
                     -exportOptionsPlist ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-ios-signed
          path: build/out/*.ipa

name: Official Script Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 必须包含子模块

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install Official Build Tool
        run: |
          # 官方依赖 gomobile 及其工具链
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: The "Magic" Command
        run: |
          # 1. 编译 sing-box 核心
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          gomobile bind -target ios -iosversion 15.0 -tags "$GO_TAGS" -ldflags "-checklinkname=0 -s -w" -o ../Libbox.xcframework ./experimental/libbox
          cd ..

          # 2. 【核心】直接执行项目自带的配置初始化
          # 如果根目录有 Makefile，这是解决路径问题的终极方案
          if [ -f "Makefile" ]; then
            make setup # 很多时候这个命令会自动对齐所有路径
          fi

      - name: Final Path Alignment
        run: |
          # 官方项目结构中，子项目 Library.xcodeproj 会在以下位置找库
          mkdir -p Library/Frameworks
          cp -R Libbox.xcframework Library/Frameworks/
          # 同时在根目录也放一份
          mkdir -p Frameworks
          cp -R Libbox.xcframework Frameworks/

      - name: Build Without Sign
        run: |
          # 模仿官方 CI 的构建参数
          xcodebuild build -project sing-box.xcodeproj \
            -scheme SFI \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_SWIFT_FLAGS="-DIPHONEOS_DEPLOYMENT_TARGET=15.0"

      - name: Package Unsigned IPA
        run: |
          APP_PATH=$(find build_output -name "SFI.app" -type d | grep "Release-iphoneos" | head -n 1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-final
          path: sing-box-unsigned.ipa

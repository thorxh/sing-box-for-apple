name: Build Unsigned IPA (Final Linker Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          export GO111MODULE=on
          # 编译产物直接输出到根目录
          gomobile bind -target ios -iosversion 15.0 -tags "$GO_TAGS" -ldflags "$GO_LDFLAGS" -o ../Libbox.xcframework ./experimental/libbox
          cd ..
          [ -d "Libbox.xcframework" ] && echo "Libbox.xcframework generated successfully."

      - name: Xcode Build (No Sign)
        run: |
          PROJ="sing-box.xcodeproj"
          SCHEME="SFI"
          
          # 获取当前绝对路径，用于传递给 Xcode
          CUR_DIR=$(pwd)

          xcodebuild archive -project "$PROJ" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     FRAMEWORK_SEARCH_PATHS="$CUR_DIR" \
                     OTHER_LDFLAGS="-framework Libbox" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SKIP_INSTALL=NO

      - name: Package Unsigned IPA
        run: |
          echo "Locating .app in archive..."
          # 搜索路径：Archive 内部的 Products/Applications
          APP_PATH=$(find build/sing-box.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: App not found. Listing archive structure:"
            ls -R build
            exit 1
          fi
          
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

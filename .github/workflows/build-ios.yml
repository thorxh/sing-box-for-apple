name: Check Libbox Compilation (Debug Only)

on:
  workflow_dispatch:

jobs:
  debug-check:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build & Verify Libbox
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          # 移除冲突标签，加入官方要求的 badlinkname
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          
          echo ">>> 正在开始编译 Libbox..."
          export GO111MODULE=on
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -tags "$GO_TAGS" \
            -ldflags "$GO_LDFLAGS" \
            -o ../Libbox.xcframework \
            ./experimental/libbox
          
          cd ..
          
          echo ">>> [检查 1] 目录是否存在？"
          if [ -d "Libbox.xcframework" ]; then
            echo "✅ Libbox.xcframework 目录已生成。"
          else
            echo "❌ 错误：未生成 Libbox.xcframework。"
            exit 1
          fi

          echo ">>> [检查 2] 内部架构是否包含 ios-arm64？"
          # 检查是否有真机架构，这是 IPA 运行的核心
          if ls Libbox.xcframework | grep -q "ios-arm64"; then
            echo "✅ 包含 ios-arm64 架构。"
          else
            echo "❌ 错误：缺少真机架构，可能只编译了模拟器版本。"
            ls -R Libbox.xcframework
            exit 1
          fi

          echo ">>> [检查 3] 符号导出检查 (Critical)"
          # 使用 nm 命令查看生成的二进制文件是否包含 Libbox 的核心入口
          # 这一步能彻底确认之前的 'no exported names' 是否真的解决了
          BINARY_PATH=$(find Libbox.xcframework/ios-arm64 -name "Libbox" -type f | head -n 1)
          if [ -f "$BINARY_PATH" ]; then
            if nm "$BINARY_PATH" | grep -q "Libbox"; then
              echo "✅ 符号导出验证通过：检测到 Libbox 相关接口。"
            else
              echo "❌ 警告：二进制文件存在，但未发现导出符号。Xcode 链接必败。"
              exit 1
            fi
          fi

          echo "🎉 恭喜！Libbox 编译阶段完美通过，可以进行下一步 Xcode 构建。"

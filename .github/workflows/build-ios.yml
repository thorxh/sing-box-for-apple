name: Build Unsigned IPA (Minimal Output)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x' 
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 核心 Tags (已移除冲突的 with_ech)
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          # 官方要求的链接器参数
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          
          echo "Starting Libbox build... (This may take several minutes without verbose output)"
          export GO111MODULE=on
          # 去掉了 -v 参数，清爽编译
          gomobile bind \
            -target ios \
            -iosversion 15.0 \
            -tags "$GO_TAGS" \
            -ldflags "$GO_LDFLAGS" \
            -o ../Libbox.xcframework \
            ./experimental/libbox
          
          cd ..
          [ -d "Libbox.xcframework" ] && echo "SUCCESS: Libbox.xcframework generated."

      - name: Xcode Build (No Sign)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

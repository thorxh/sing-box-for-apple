name: Build Unsigned IPA (New Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Dependencies
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Read Makefile and Build
        run: |
          echo "--- Makefile Targets ---"
          grep -E '^[a-zA-Z0-9_-]+:' Makefile || true
          
          # 根据常见目标名进行尝试
          if grep -q "ios:" Makefile; then
            make ios
          elif grep -q "apple:" Makefile; then
            make apple
          elif grep -q "libs:" Makefile; then
            make libs
          elif [ -f "SFI/Makefile" ]; then
            cd SFI && make
          else
            # 最后的兜底：如果 Makefile 没写清楚，直接运行 Go 脚本（如果它还在的话）
            find . -name "gen_framework" -exec go run {} --platform ios \; || echo "No gen_framework found"
          fi

      - name: Xcode Build (No Sign)
        run: |
          # 寻找项目文件并构建
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找生成的 .app 并打包
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

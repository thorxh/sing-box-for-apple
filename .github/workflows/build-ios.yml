name: Build Unsigned IPA (Symbol Export Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          # 必须使用 sagernet fork 解决 ObjC 符号缺失
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核
          git clone --branch v1.11.3 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐依赖并整理 Module
          go mod download
          go mod tidy
          
          # 3. 强制开启 Module 模式并执行绑定
          # 重点：指定完整的包名 github.com/SagerNet/sing-box/lib/mobile
          # 这样 gobind 才能正确通过 go.mod 找到导出的接口
          export GO111MODULE=on
          gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            github.com/SagerNet/sing-box/lib/mobile
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保 Libbox 已经到位
          [ -d "Libbox.xcframework" ] || { echo "Libbox missing!"; exit 1; }
          
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.11.3-unsigned
          path: sing-box-unsigned.ipa

name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build SFA Framework
        run: |
          # 自动探测 go.mod 所在目录并进入执行
          TARGET_DIR=$(find . -name "go.mod" -exec dirname {} \; | head -n 1)
          echo "Found go.mod in $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 确保在有 gen_framework 的地方运行
          # 如果当前目录没有 cmd/gen_framework，就去上一级找，或者全局找
          GEN_SCRIPT=$(find . -name "gen_framework" -path "*/cmd/*" | head -n 1)
          GEN_DIR=$(dirname $(dirname "$GEN_SCRIPT"))
          
          echo "Running build script in $GEN_DIR"
          cd "$GEN_DIR"
          go mod tidy
          go run ./cmd/gen_framework --platform ios

      - name: Xcode Build (No Sign)
        run: |
          # 找到工程文件所在目录执行
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 动态寻找构建出的 .app 并打包
          APP_PATH=$(find build/SFA.xcarchive/Products/Applications -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

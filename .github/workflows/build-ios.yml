name: Build Unsigned IPA for New SagerNet

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Frameworks via Makefile
        run: |
          # 既然根目录有 Makefile，我们直接调用它
          # 针对新版，通常是这个命令来生成 Apple 各平台的库
          make xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 新版工程文件名改成了 sing-box.xcodeproj
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 查找生成的 .app (SFI 代表 Sing-box For iOS)
          find build/sing-box.xcarchive/Products/Applications -name "*.app" -exec cp -r {} Payload/ \;
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

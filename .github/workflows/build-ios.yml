name: Build Unsigned IPA (Official Tool Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核 v1.13.11
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐依赖
          go mod download
          
          # 3. 核心修复：使用官方 build_libbox 的正确语法
          # 根据报错提示，它使用 -platform ios，不接受 -o
          export GO111MODULE=on
          go run ./cmd/internal/build_libbox -platform ios
          
          # 4. 产物定位：
          # 官方脚本通常在 core 根目录或指定位置生成 Libbox.xcframework
          # 我们将其移动到上级目录供 Xcode 使用
          cd ..
          FRAMEWORK_PATH=$(find core -name "Libbox.xcframework" -type d | head -n 1)
          if [ -n "$FRAMEWORK_PATH" ]; then
            cp -r "$FRAMEWORK_PATH" ./Libbox.xcframework
          else
            echo "Error: Libbox.xcframework not generated by official script!"
            exit 1
          fi
          
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 动态寻找工程文件
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

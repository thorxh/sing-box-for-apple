name: Build Unsigned IPA for EasySign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build SFA Framework
        # 关键点：进入 SFA 目录执行，那里才有 go.mod 和构建脚本
        working-directory: SFA
        run: |
          go mod tidy
          go run ./cmd/gen_framework --platform ios

      - name: Xcode Build (No Sign)
        run: |
          xcodebuild -workspace SFA.xcworkspace \
                     -scheme SFA \
                     -configuration Release \
                     -archivePath build/SFA.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          find build/SFA.xcarchive/Products/Applications -name "*.app" -exec cp -r {} Payload/ \;
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

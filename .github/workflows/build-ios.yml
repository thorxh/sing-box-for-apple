name: Build Unsigned IPA (Direct Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Generate Framework (Manual)
        run: |
          # 绕过 Makefile，直接运行项目里的框架生成脚本
          # 根据目录树，脚本通常在 ./cmd/gen_framework 
          SCRIPT=$(find . -name "gen_framework" | head -n 1)
          echo "Using script: $SCRIPT"
          go run "$SCRIPT" --platform ios

      - name: Xcode Build (No Sign)
        run: |
          # 直接进行 Release 模式归档，并彻底关闭签名检查
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找归档中的 .app 文件夹
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found! Current dir content:"
            find build -name "*.app"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

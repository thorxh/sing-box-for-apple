name: Build Unsigned IPA (Official Build Logic)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 建议保持在 1.23
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核 v1.13.11
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐依赖
          go mod download
          
          # 3. 核心修正：使用官方内部构建工具
          # 这个工具位于 cmd/internal/build_libbox，它会自动处理 experimental/libbox 的导出
          # 我们直接调用它的入口函数（通常内核根目录有对应的驱动脚本或通过 go run 触发）
          # 根据 v1.13.11 结构，执行以下命令：
          export GO111MODULE=on
          go run ./cmd/internal/build_libbox -target ios -o ../Libbox.xcframework
          
          cd ..
          
          # 4. 兼容性检查：如果上面的命令没生成，则执行最后的强力 bind
          if [ ! -d "Libbox.xcframework" ]; then
            cd core
            gomobile bind -v -target ios -iosversion 15.0 \
              -tags "with_quic with_dhcp with_wireguard with_shadowsocks with_ech with_utls with_clash_api with_gvisor" \
              -o ../Libbox.xcframework \
              ./experimental/libbox
            cd ..
          fi
          
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保环境变量绕过签名
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

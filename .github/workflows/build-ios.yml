name: Build Unsigned IPA (Fix Libbox Missing)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Compile Libbox Framework
        run: |
          # 1. 寻找包含 go.mod 的核心目录（通常是 sing-box 核心）
          # 新版项目通常在根目录下执行特定的 go run 脚本来生成这个 xcframework
          # 我们尝试直接运行生成脚本，并指定输出名称为 Libbox
          
          SCRIPT=$(find . -name "gen_framework" | head -n 1)
          echo "Found generator script at: $SCRIPT"
          
          # 执行编译，并将产物命名为 Libbox.xcframework
          # 注意：--out 参数是关键，必须对应报错信息里的路径
          go run "$SCRIPT" --platform ios --out ./Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保 Libbox.xcframework 就在当前目录下
          ls -d Libbox.xcframework || (echo "Libbox not found!" && exit 1)

          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned-ipa
          path: sing-box-unsigned.ipa

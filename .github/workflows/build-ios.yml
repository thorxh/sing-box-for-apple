name: Build Unsigned IPA (Java 17 & Official Tool)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 使用广泛兼容的 Temurin (OpenJDK)
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install SagerNet Gomobile Tools
        run: |
          # 修正安装路径：通过完整包名安装二进制
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          
          GOPATH=$(go env GOPATH)
          echo "$GOPATH/bin" >> $GITHUB_PATH
          # 初始化 gomobile
          $GOPATH/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核 v1.13.11
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          
          # 2. 补齐 Go 依赖
          go mod download
          
          # 3. 执行官方构建脚本 (此时 Java 17 已就绪)
          export GO111MODULE=on
          go run ./cmd/internal/build_libbox -platform ios
          
          # 4. 移动产物
          cd ..
          # 脚本通常在 core 根目录或 core/bin 下生成 Libbox.xcframework
          FRAMEWORK_PATH=$(find core -name "Libbox.xcframework" -type d | head -n 1)
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "Error: Libbox.xcframework not found in core directory!"
            ls -R core
            exit 1
          fi
          mv "$FRAMEWORK_PATH" ./Libbox.xcframework
          
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

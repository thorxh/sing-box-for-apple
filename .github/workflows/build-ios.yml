name: Build Unsigned IPA (Absolute Path Injection)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          export GO111MODULE=on
          # 产物生成在根目录
          gomobile bind -target ios -iosversion 15.0 -tags "$GO_TAGS" -ldflags "$GO_LDFLAGS" -o ../Libbox.xcframework ./experimental/libbox
          cd ..

      - name: Injection & Environment Setup
        run: |
          # 物理注入到每个可能的位置
          mkdir -p Frameworks Library/Frameworks Extension/Frameworks
          cp -rf Libbox.xcframework Frameworks/
          cp -rf Libbox.xcframework Library/Frameworks/
          cp -rf Libbox.xcframework ./Library/
          
          # 设置全局环境变量，让 Xcode 的子进程避开路径搜索逻辑直接命中
          echo "LIBRARY_PATH=$(pwd):$(pwd)/Frameworks:$(pwd)/Library/Frameworks" >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$(pwd)/Libbox.xcframework/ios-arm64/Libbox.framework/Headers" >> $GITHUB_ENV

      - name: Xcode Build (The Last Stand)
        run: |
          # 使用极致暴力参数：关闭一切验证，强制全量编译
          xcodebuild build -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     FRAMEWORK_SEARCH_PATHS="$(pwd) $(pwd)/Frameworks $(pwd)/Library $(pwd)/Library/Frameworks $(pwd)/Extension/Frameworks" \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     BITCODE_GENERATION_MODE=bitcode \
                     STRIP_INSTALLED_PRODUCT=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     SWIFT_COMPILATION_MODE=wholemodule \
                     OTHER_LDFLAGS="-framework Libbox"

      - name: Package IPA
        run: |
          # 放弃 find 命令的各种限制，直接暴力抓取任何 Release-iphoneos 下的 .app
          APP_DIR=$(find build_output -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
            echo "FAILED: No .app generated. Printing full tree for post-mortem:"
            find build_output -maxdepth 4
            exit 1
          fi
          
          echo "Found: $APP_DIR"
          mkdir -p Payload
          cp -rf "$APP_DIR" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-final-attempt
          path: sing-box-unsigned.ipa

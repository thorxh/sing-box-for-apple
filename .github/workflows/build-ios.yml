name: Build Unsigned IPA (Path Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Install SagerNet Gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          git clone --branch v1.13.11 https://github.com/SagerNet/sing-box.git core
          cd core
          export GO_TAGS="with_quic with_dhcp with_wireguard with_shadowsocks with_utls with_clash_api with_gvisor badlinkname ios"
          export GO_LDFLAGS="-checklinkname=0 -s -w"
          
          export GO111MODULE=on
          gomobile bind \
            -target ios \
            -iosversion 15.0 \
            -tags "$GO_TAGS" \
            -ldflags "$GO_LDFLAGS" \
            -o ../Libbox.xcframework \
            ./experimental/libbox
          cd ..
          [ -d "Libbox.xcframework" ] && echo "Libbox generated."

      - name: Xcode Build (No Sign)
        run: |
          # 动态寻找 .xcodeproj
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          # 1. 尝试清除旧缓存并构建
          # 强制将产物输出到 ./build 目录，方便我们查找
          xcodebuild -project "$PROJ" \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     -derivedDataPath derived_data \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          # 2. 深度搜索生成的 .app 文件
          # 有时 Xcode 会把 .app 放在 DerivedData 或者 archive 的不同子目录下
          echo "Searching for .app file..."
          APP_PATH=$(find build/sing-box.xcarchive -name "*.app" -type d | head -n 1)
          
          # 如果在 archive 里没找到，去 DerivedData 里找
          if [ -z "$APP_PATH" ]; then
             APP_PATH=$(find derived_data -name "*.app" -type d | grep "/Release-iphoneos/" | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: .app file not found! Current directory structure:"
            ls -R build || echo "Build dir missing"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-v1.13.11-unsigned
          path: sing-box-unsigned.ipa

name: Build Unsigned IPA (Debug & Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Pre-Build Inspection (你要求的确认信息)
        run: |
          echo "--- 确认 1: 搜索内核仓库中的构建脚本 ---"
          # 假设我们克隆到 core 目录，这里先看根目录，稍后克隆后再看 core
          find . -maxdepth 3 -name "*gen*" || true
          
          echo "--- 确认 2: 检查壳项目根目录内容 ---"
          ls -F
          
          echo "--- 确认 3: 检查依赖声明 ---"
          cat Package.swift 2>/dev/null || echo "No Package.swift"
          grep -r "Libbox" . --max-count=5 || true

      - name: Install SagerNet Gomobile Tools
        run: |
          # 使用 SagerNet 专用的工具链，这是解决 Obj-C 绑定符号缺失的关键
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: Build Libbox Framework
        run: |
          # 1. 克隆内核
          git clone --branch v1.11.3 https://github.com/SagerNet/sing-box.git core
          cd core
          
          echo "--- 深度确认: 核心仓库内部结构 ---"
          find . -maxdepth 3 -name "*gen*" || true
          
          # 2. 补齐依赖
          go mod download
          
          # 3. 手动绑定。注意：输出路径必须是大写的 Libbox.xcframework
          # 针对 v1.11+ 版本，路径通常是 ./lib/mobile
          $(go env GOPATH)/bin/gomobile bind -v \
            -target ios \
            -iosversion 15.0 \
            -o ../Libbox.xcframework \
            ./lib/mobile
          
          cd ..
          ls -d Libbox.xcframework

      - name: Xcode Build (No Sign)
        run: |
          # 确保环境变量和依赖解析正确
          xcodebuild -project sing-box.xcodeproj \
                     -scheme SFI \
                     -configuration Release \
                     -archivePath build/sing-box.xcarchive \
                     -resolvePackageDependencies \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 自动寻找生成的 .app
          APP_PATH=$(find build/sing-box.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            ls -R build
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r sing-box-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-unsigned
          path: sing-box-unsigned.ipa

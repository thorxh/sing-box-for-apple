name: Build Unsigned IPA from Scratch

on:
  workflow_dispatch:

jobs:
  build-sfi:
    runs-on: macos-latest
    steps:
      # 1. 克隆 iOS 客户端源码
      - name: Checkout sing-box-for-apple
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box-for-apple
          submodules: 'recursive'
          fetch-depth: 0

      # 设置 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # 2. 安装并初始化 gomobile
      - name: Install and Setup gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@latest
          go install github.com/sagernet/gomobile/cmd/gobind@latest
          gomobile init

      # 3. 克隆核心库 / sing-box 源码，并切换到指定版本
      - name: Clone sing-box core
        run: |
          git clone  -b v1.13.11  # 或指定其他版本

      # 4. 编译生成 Libbox.xcframework，这一步是核心
      - name: Build Libbox.xcframework
        run: |
          # 假设 sing-box 核心代码与 apple 项目保持同级的目录结构
          cd ../sing-box
          make lib_install

      # 5. Xcode 归档构建 (无签名)
      - name: Archive (No Signing)
        run: |
          xcodebuild archive \
            -project sing-box.xcodeproj \
            -scheme SFI \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/SFI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE=""

      # 6. 打包 IPA
      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/SFI.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r SFI.ipa Payload

      # 7. 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SFI-unsigned.ipa
          path: SFI.ipa

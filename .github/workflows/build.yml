name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析 Swift 包依赖
        run: |
          xcodebuild -resolvePackageDependencies \
            -project sing-box.xcodeproj \
            -scheme SFI

      - name: 构建存档
        run: |
          xcodebuild archive \
            -project sing-box.xcodeproj \
            -scheme SFI \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/SFI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: 打包 IPA
        run: |
          mkdir -p Payload
          cp -R ./build/SFI.xcarchive/Products/Applications/SFI.app Payload/
          zip -r SFI.ipa Payload
          rm -rf Payload

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: SFI.ipa
          path: SFI.ipa

name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码 (含子模块)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: 安装 SagerNet 定制的 gomobile
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          $(go env GOPATH)/bin/gomobile init

      - name: 编译 Libbox.xcframework (使用仓库自带脚本)
        run: |
          # 赋予脚本执行权限
          chmod +x compile_libbox.sh
          # 运行编译，指定内核版本（默认最新 dev 分支，也可传参）
          bash compile_libbox.sh

      - name: Xcode 归档构建 (无签名)
        run: |
          xcodebuild archive \
            -project sing-box.xcodeproj \
            -scheme SFI \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/SFI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 打包 IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/SFI.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r SFI.ipa Payload
          rm -rf Payload

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: SFI-unsigned.ipa
          path: SFI.ipa
